spring:
  application:
    name: expensetracker
  datasource:
    url: jdbc:mysql://localhost:3306/expensetracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: localhost
      port: 6379

rate-limit:
  login:
    max-attempts: 5
    window-seconds: 60

jwt:
  secret: ${JWT_SECRET}
