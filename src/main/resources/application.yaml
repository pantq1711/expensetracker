spring:
  application:
    name: expensetracker
  datasource:
    url: jdbc:mysql://localhost:3306/expensetracker_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
server:
  port: 8080